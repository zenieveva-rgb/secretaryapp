<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | School Secretary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="glass-card" style="max-width: 800px;">
            <div class="header">
                <div class="logo" style="background: linear-gradient(135deg, #ff6b6b, #ff416c);">
                    <i class="fas fa-user-cog"></i>
                </div>
                <h1>Admin Dashboard</h1>
                <p class="subtitle">Manage secretary accounts</p>
            </div>

            <!-- Pending Requests -->
            <div class="recent-scans">
                <div class="section-title">
                    <i class="fas fa-clock"></i> Pending Requests
                </div>
                <div class="scan-list" id="pending-list" style="max-height: 400px;">
                    <div style="text-align: center; padding: 40px; color: #666;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 48px;"></i>
                        <div>Loading requests...</div>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-requests">0</div>
                    <div class="stat-label">Pending Requests</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-users">0</div>
                    <div class="stat-label">Approved Users</div>
                </div>
            </div>

            <button onclick="emergencyLogout()" class="btn btn-danger" style="margin-top: 20px;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        // Load pending requests
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = sessionStorage.getItem('currentUser');
            if (currentUser !== 'admin001') {
                window.location.href = 'index.html';
                return;
            }

            try {
                const snapshot = await get(ref(db, 'pendingRequests'));
                const list = document.getElementById('pending-list');
                const totalRequestsEl = document.getElementById('total-requests');
                
                list.innerHTML = '';
                
                if (snapshot.exists()) {
                    const requests = Object.entries(snapshot.val());
                    totalRequestsEl.textContent = requests.length;
                    
                    requests.forEach(([username, data]) => {
                        const item = document.createElement('div');
                        item.className = 'scan-item';
                        item.innerHTML = `
                            <div class="scan-icon"><i class="fas fa-user-plus"></i></div>
                            <div class="scan-info">
                                <div class="scan-name">${data.username}</div>
                                <div class="scan-time">${data.email}</div>
                                <div>${data.fullName} • ${data.employeeId}</div>
                                <div style="margin-top: 8px; display: flex; gap: 8px;">
                                    <button onclick="approveUser('${username}')" class="btn" style="background: var(--success); padding: 8px 16px;">
                                        <i class="fas fa-check"></i> Approve
                                    </button>
                                    <button onclick="rejectUser('${username}')" class="btn btn-danger" style="padding: 8px 16px;">
                                        <i class="fas fa-times"></i> Reject
                                    </button>
                                </div>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                } else {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No pending requests</div>';
                }
                
                // Load total users
                const usersSnapshot = await get(ref(db, 'users'));
                document.getElementById('total-users').textContent = usersSnapshot.exists() ? Object.keys(usersSnapshot.val()).length : 0;
                
            } catch (error) {
                console.error('Admin load error:', error);
                document.getElementById('pending-list').innerHTML = '<div style="color: #ff416c;">Error loading data</div>';
            }
        });
    </script>
</body>
</html>
