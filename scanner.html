<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Pro | Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-icon">
            <i class="fas fa-check"></i>
        </div>
        <div>
            <div style="font-weight: 600; margin-bottom: 2px;">Success</div>
            <div style="font-size: 0.9rem; opacity: 0.8;" id="toast-message">Student logged successfully</div>
        </div>
    </div>

    <div class="container">
        <div class="glass-card" style="max-width: 500px;">
            <div class="scanner-header">
                <div class="logo" style="width: 50px; height: 50px; margin: 0 auto 15px;">
                    <i class="fas fa-qrcode" style="font-size: 24px;"></i>
                </div>
                <h1 style="font-size: 1.5rem; text-align: center;">Scanner</h1>
                <div style="text-align: center;">
                    <span class="status-badge">System Active</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="scan-count">0</div>
                    <div class="stat-label">Scans Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="last-scan">--:--</div>
                    <div class="stat-label">Last Scan</div>
                </div>
            </div>

            <div class="scanner-wrapper">
                <div class="scanner-frame">
                    <div id="qr-reader"></div>
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                    <div class="scan-line"></div>
                </div>
            </div>

            <p class="scan-hint">Position QR code within the frame</p>

            <div class="recent-scans">
                <div class="section-title">
                    <i class="fas fa-history"></i> Recent Activity
                </div>
                <div class="scan-list" id="scan-list">
                    <!-- Scan items will be added here -->
                </div>
            </div>

            <button class="btn btn-danger" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
