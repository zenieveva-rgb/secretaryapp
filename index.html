<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Pro | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-icon">
            <i class="fas fa-check"></i>
        </div>
        <div>
            <div style="font-weight: 600; margin-bottom: 2px;">Success</div>
            <div style="font-size: 0.9rem; opacity: 0.8;" id="toast-message">Student logged successfully</div>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to access the scanner</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder=" " required autocomplete="off">
                    <label class="floating-label">Username</label>
                </div>

                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder=" " required>
                    <label class="floating-label">Password</label>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="link-text">
                Don't have an account? <a href="signup.html" class="link">Create one</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
