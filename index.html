<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Secretary | Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="security-grid"></div>

    <!-- Toast Notification System -->
    <div class="toast" id="toast">
        <div class="toast-icon"><i class="fas fa-shield-alt"></i></div>
        <div>
            <div style="font-weight: 600; margin-bottom: 2px;">Security Alert</div>
            <div style="font-size: 0.9rem; opacity: 0.8;" id="toast-message">Verification required</div>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">
            <!-- Security Badge -->
            <div class="security-badge">
                <i class="fas fa-lock"></i>
                <span>SECURE SYSTEM v3.0</span>
            </div>

            <div class="header">
                <div class="logo">
                    <i class="fas fa-school"></i>
                </div>
                <h1>Secretary Portal</h1>
                <p class="subtitle">Multi-layered authentication required</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <i class="fas fa-user-shield input-icon"></i>
                    <input type="text" id="username" placeholder=" " required autocomplete="off" pattern="[a-zA-Z0-9_]{4,20}" title="4-20 characters, alphanumeric only">
                    <label class="floating-label">Secretary ID</label>
                </div>

                <div class="form-group">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password" id="password" placeholder=" " required minlength="8">
                    <label class="floating-label">Secure Password</label>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <!-- Anti-bot honeypot field (hidden from real users) -->
                <div class="honeypot" style="display: none;">
                    <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                </div>

                <div class="security-notice">
                    <i class="fas fa-fingerprint"></i>
                    <span>Access restricted to verified school secretaries only. All attempts are logged.</span>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span><i class="fas fa-sign-in-alt"></i> Authenticate</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="link-text">
                Need secretary access? <a href="signup.html" class="link">Request Account</a>
            </div>

            <div class="security-footer">
                <div class="security-item" title="Role-Based Access Control"><i class="fas fa-user-lock"></i> RBAC</div>
                <div class="security-item" title="256-bit Encryption"><i class="fas fa-shield-virus"></i> AES-256</div>
                <div class="security-item" title="Real-time Monitoring"><i class="fas fa-video"></i> Monitored</div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
