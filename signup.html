<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Secretary | Account Request</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Success Animation */
        .success-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--success), #00cc88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .success-animation.show {
            opacity: 1;
            visibility: visible;
        }
        .success-icon {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            margin-bottom: 24px;
            animation: bounceIn 0.8s ease;
        }
        .success-title {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }
        .success-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            text-align: center;
            max-width: 300px;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .fade-out {
            animation: fadeOut 0.5s ease forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-icon"><i class="fas fa-user-shield"></i></div>
        <div>
            <div style="font-weight: 600; margin-bottom: 2px;">System Notice</div>
            <div style="font-size: 0.9rem; opacity: 0.8;" id="toast-message">Processing request</div>
        </div>
    </div>

    <!-- Success Animation Overlay -->
    <div class="success-animation" id="successAnimation">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="success-title">Request Submitted!</div>
        <div class="success-subtitle">Admin will review your account soon. Redirecting to login...</div>
    </div>

    <div class="container">
        <div class="glass-card" id="signupCard">
            <div class="security-badge" style="background: rgba(255, 42, 109, 0.2); border-color: rgba(255, 42, 109, 0.4);">
                <i class="fas fa-user-plus" style="color: var(--accent);"></i>
                <span style="color: var(--accent);">REGISTRATION PORTAL</span>
            </div>

            <div class="header">
                <div class="logo" style="background: linear-gradient(135deg, var(--accent), #ff6b6b);">
                    <i class="fas fa-id-card"></i>
                </div>
                <h1>Request Access</h1>
                <p class="subtitle">School secretary verification required</p>
            </div>

            <form id="signupForm">
                <!-- Email -->
                <div class="form-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="newEmail" placeholder=" " required autocomplete="off">
                    <label class="floating-label">School Email Address</label>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <i class="fas fa-user-tie input-icon"></i>
                    <input type="text" id="newUsername" placeholder=" " required autocomplete="off" minlength="3">
                    <label class="floating-label">Desired Secretary ID</label>
                </div>

                <!-- Full Name -->
                <div class="form-group">
                    <i class="fas fa-signature input-icon"></i>
                    <input type="text" id="fullName" placeholder=" " required autocomplete="off">
                    <label class="floating-label">Full Legal Name</label>
                </div>

                <!-- Employee ID -->
                <div class="form-group">
                    <i class="fas fa-hashtag input-icon"></i>
                    <input type="text" id="employeeId" placeholder=" " required autocomplete="off">
                    <label class="floating-label">School Employee ID</label>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="newPassword" placeholder=" " required minlength="6">
                    <label class="floating-label">Create Password (min 6 chars)</label>
                    <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" id="signupBtn" style="background: linear-gradient(135deg, var(--accent), #ff6b6b);">
                    <span><i class="fas fa-paper-plane"></i> Submit Request</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>

            <div class="security-footer">
                <div class="security-item"><i class="fas fa-shield-alt"></i> Verified</div>
                <div class="security-item"><i class="fas fa-user-check"></i> Reviewed</div>
                <div class="security-item"><i class="fas fa-envelope"></i> Notified</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBU4Mvwjuv2HOscvYyQT4UwHNsyoXIr6Kw",
            authDomain: "school-secretary-app.firebaseapp.com",
            databaseURL: "https://school-secretary-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-secretary-app",
            storageBucket: "school-secretary-app.firebasestorage.app",
            messagingSenderId: "507429367336",
            appId: "1:507429367336:web:796e381a780a33ef98cf1d",
            measurementId: "G-5ZQE5M1SWC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Elements
        const signupForm = document.getElementById('signupForm');
        const signupCard = document.getElementById('signupCard');
        const successAnimation = document.getElementById('successAnimation');
        const signupBtn = document.getElementById('signupBtn');

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = toast.querySelector('.toast-icon i');

            toastMessage.textContent = message;

            if (type === 'error') {
                toast.style.borderColor = '#ff416c';
                toastIcon.className = 'fas fa-exclamation-circle';
                toastIcon.parentElement.style.background = 'rgba(255, 65, 108, 0.2)';
                toastIcon.style.color = '#ff416c';
            } else {
                toast.style.borderColor = 'var(--success)';
                toastIcon.className = 'fas fa-check';
                toastIcon.parentElement.style.background = 'rgba(5, 255, 161, 0.2)';
                toastIcon.style.color = 'var(--success)';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // Loading State
        function setLoading(loading) {
            const spinner = signupBtn.querySelector('.spinner');
            const text = signupBtn.querySelector('span');
            
            if (loading) {
                spinner.style.display = 'block';
                text.style.display = 'none';
                signupBtn.disabled = true;
            } else {
                spinner.style.display = 'none';
                text.style.display = 'block';
                signupBtn.disabled = false;
            }
        }

        // Success Animation + Redirect
        function showSuccessAndRedirect() {
            setLoading(false);
            signupCard.classList.add('fade-out');
            
            setTimeout(() => {
                successAnimation.classList.add('show');
            }, 300);
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2500);
        }

        // Password Toggle
        window.togglePassword = (inputId, button) => {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        };

        // Form Submit
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true);
            showToast('Submitting request...', 'success');

            try {
                const email = document.getElementById('newEmail').value.trim();
                const username = document.getElementById('newUsername').value.trim();
                const password = document.getElementById('newPassword').value;
                const fullName = document.getElementById('fullName').value.trim();
                const employeeId = document.getElementById('employeeId').value.trim();

                // Validation
                if (!email || !username || !password || password.length < 6) {
                    throw new Error('Please fill all fields (password min 6 chars)');
                }

                // Check duplicates
                const existingRequest = await get(ref(db, `pendingRequests/${username}`));
                const existingUser = await get(ref(db, `users/${username}`));
                
                if (existingRequest.exists() || existingUser.exists()) {
                    throw new Error('Username already exists or requested!');
                }

                // Save to Firebase
                await set(ref(db, `pendingRequests/${username}`), {
                    email, username, password, fullName, employeeId,
                    requestedAt: new Date().toLocaleString('en-PH'),
                    status: 'pending'
                });

                showToast(`✅ Success! Request saved (ID: ${username})`);
                showSuccessAndRedirect();

            } catch (error) {
                console.error('Signup Error:', error);
                showToast(error.message || 'Request failed. Try again.', 'error');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
