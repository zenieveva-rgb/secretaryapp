<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Secretary | Account Request</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Success Screen */
        .success-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #05ffa1, #00cc88);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        .success-title { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; }
        .success-text { font-size: 1.2em; text-align: center; }
        .fade-out { opacity: 0 !important; transform: translateY(-20px); transition: all 0.5s ease; }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Toast -->
    <div class="toast" id="toast" style="display: none;">
        <div class="toast-icon"><i class="fas fa-check"></i></div>
        <div id="toast-message">Success!</div>
    </div>

    <!-- SUCCESS SCREEN -->
    <div class="success-screen" id="successScreen">
        <div class="success-icon">✅</div>
        <div class="success-title">Account Request Submitted!</div>
        <div class="success-text">Redirecting to login in 3 seconds...</div>
    </div>

    <div class="container">
        <div class="glass-card" id="mainCard">
            <div class="header">
                <div class="logo" style="background: linear-gradient(135deg, #ff416c, #ff6b6b);">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Request Secretary Account</h1>
                <p style="color: rgba(255,255,255,0.7);">Admin approval required</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="newEmail" placeholder=" " required>
                    <label class="floating-label">Email</label>
                </div>

                <div class="form-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="newUsername" placeholder=" " required minlength="3">
                    <label class="floating-label">Username</label>
                </div>

                <div class="form-group">
                    <i class="fas fa-user-tie input-icon"></i>
                    <input type="text" id="fullName" placeholder=" " required>
                    <label class="floating-label">Full Name</label>
                </div>

                <div class="form-group">
                    <i class="fas fa-id-badge input-icon"></i>
                    <input type="text" id="employeeId" placeholder=" " required>
                    <label class="floating-label">Employee ID</label>
                </div>

                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="newPassword" placeholder=" " required minlength="6">
                    <label class="floating-label">Password (6+ chars)</label>
                </div>

                <button type="submit" class="btn btn-primary" id="signupBtn" style="background: linear-gradient(135deg, #ff416c, #ff6b6b);">
                    <span id="btnText"><i class="fas fa-paper-plane"></i> Submit Request</span>
                    <div class="spinner" style="display: none;"></div>
                </button>
            </form>

            <div style="text-align: center; margin-top: 20px; color: rgba(255,255,255,0.6);">
                <small>Admin will review within 24 hours</small>
            </div>

            <a href="index.html" class="btn btn-secondary" style="margin-top: 15px;">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBU4Mvwjuv2HOscvYyQT4UwHNsyoXIr6Kw",
            authDomain: "school-secretary-app.firebaseapp.com",
            databaseURL: "https://school-secretary-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-secretary-app",
            storageBucket: "school-secretary-app.firebasestorage.app",
            messagingSenderId: "507429367336",
            appId: "1:507429367336:web:796e381a780a33ef98cf1d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Elements
        const form = document.getElementById('signupForm');
        const btn = document.getElementById('signupBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.querySelector('.spinner');
        const mainCard = document.getElementById('mainCard');
        const successScreen = document.getElementById('successScreen');
        const toast = document.getElementById('toast');

        // Show Toast
        function showToast(message, isError = false) {
            const msgEl = document.getElementById('toast-message');
            msgEl.textContent = message;
            
            if (isError) {
                toast.querySelector('.toast-icon i').className = 'fas fa-exclamation-triangle';
                toast.style.borderColor = '#ff416c';
            } else {
                toast.querySelector('.toast-icon i').className = 'fas fa-check-circle';
                toast.style.borderColor = '#05ffa1';
            }
            
            toast.style.display = 'flex';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.style.display = 'none', 400);
            }, 3500);
        }

        // Loading
        function setLoading(loading) {
            if (loading) {
                spinner.style.display = 'block';
                btnText.style.display = 'none';
                btn.disabled = true;
            } else {
                spinner.style.display = 'none';
                btnText.style.display = 'block';
                btn.disabled = false;
            }
        }

        // Success + Redirect
        function showSuccess() {
            setLoading(false);
            mainCard.style.opacity = '0';
            mainCard.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                successScreen.style.display = 'flex';
            }, 500);
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
        }

        // Submit Form
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('newEmail').value.trim();
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const fullName = document.getElementById('fullName').value.trim();
            const employeeId = document.getElementById('employeeId').value.trim();

            // Simple validation
            if (!email || !username || !password || password.length < 6 || !fullName || !employeeId) {
                showToast('Please fill all fields correctly', true);
                return;
            }

            setLoading(true);
            showToast('Sending request to admin...');

            // Save to Firebase
            const requestData = {
                email: email,
                username: username,
                password: password,
                fullName: fullName,
                employeeId: employeeId,
                requestedAt: new Date().toLocaleString(),
                status: 'pending'
            };

            db.ref('pendingRequests/' + username).set(requestData)
                .then(() => {
                    console.log('✅ SAVED TO FIREBASE:', username);
                    showToast('✅ Request submitted successfully!');
                    showSuccess();
                })
                .catch((error) => {
                    console.error('❌ FIREBASE ERROR:', error);
                    showToast('Failed to submit. Try again.', true);
                    setLoading(false);
                });
        });
    </script>
</body>
</html>
